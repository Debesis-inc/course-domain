name: CI/CD — Docker Build & Deploy

# ── WHEN does this run? ──────────────────────────────────
on:
  push:
    branches: [ main ]       # every push to main → full CI + CD
  pull_request:
    branches: [ main ]       # every PR → CI only (no deploy)

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1 — CI: compile, test, build image, push to Hub
  # ══════════════════════════════════════════════════════
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest   # GitHub spins up a fresh Ubuntu VM for this

    steps:

      # 1. Download your code onto the GitHub runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Java 25 on the runner
      #    cache: maven → caches ~/.m2 so dependencies
      #    aren't re-downloaded on every run (saves ~1 min)
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Verify Java and Docker
        run: |
          java -version
          javac -version
          mvn -version
          docker version
          docker info

      # 3. Run your tests
      #    If any test fails → this step fails → pipeline stops
      #    → deploy job never runs → server is safe
      - name: Run tests
        run: mvn test

      - name: Print Surefire reports if tests fail
        if: failure()
        run: |
          echo "===== Surefire TXT Reports ====="
          find target/surefire-reports -name "*.txt" -type f -print -exec cat {} \;

          echo "===== Surefire XML Reports ====="
          find target/surefire-reports -name "*.xml" -type f -print -exec cat {} \;
        # ↑ change to: mvn test   once you have real tests

      # 4. Only log into Docker Hub on pushes to main
      #    No point logging in for PR checks
      - name: Check Docker secrets exist
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ DOCKER_USERNAME is missing"
            exit 1
          else
            echo "✅ DOCKER_USERNAME exists"
          fi

          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ DOCKER_PASSWORD is missing"
            exit 1
          else
            echo "✅ DOCKER_PASSWORD exists"
          fi

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # from GitHub secrets
          password: ${{ secrets.DOCKER_PASSWORD }}  # your Docker Hub token

      # 5. Build the Docker image using your Dockerfile
      #    and push it to Docker Hub with two tags:
      #    - debesis/course-domain:latest     (always newest)
      #    - debesis/course-domain:a1b2c3...  (this specific commit)
      - name: Build & Push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .          # use Dockerfile in project root
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/course-domain:latest
            ${{ secrets.DOCKER_USERNAME }}/course-domain:${{ github.sha }}

  # ══════════════════════════════════════════════════════
  # JOB 2 — CD: pull new image on VPS, restart container
  # ══════════════════════════════════════════════════════
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/course-domain

            docker compose pull
            docker compose up -d
            docker image prune -f

            docker compose ps
            echo "✅ Deployed $(docker ps --format '{{.Image}}' --filter name=course-domain)"