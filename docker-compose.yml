services:
  postgres:
    image: postgres:16
    container_name: course-postgres
    restart: always
    environment:
      POSTGRES_DB: debesisDatabase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: PostgreSQL@2026!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: