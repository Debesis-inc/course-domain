version: '3.8'

services:

  # ── MongoDB ──────────────────────────────────────────
  mongodb:
    image: mongo:8.0
    container_name: course-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: DigitalOcean2026Debesis
      MONGO_INITDB_DATABASE: course
    volumes:
      - mongo_data:/data/db    # data persists across container restarts
  # only accessible from localhost — not public

  # ── Spring Boot App ───────────────────────────────────
  course-domain:
    build: .                   # builds from your Dockerfile
    image: course-domain:latest
    container_name: course-domain
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:DigitalOcean2026Debesis@mongodb:27017/course?authSource=admin
      # Notice: uses "mongodb" (service name) not "localhost"
      # Docker networking lets containers find each other by service name
    depends_on:
      - mongodb                # waits for MongoDB to start first

volumes:
  mongo_data:                  # named volume — survives container restarts